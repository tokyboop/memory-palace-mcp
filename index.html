  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght: 900;\n  font-display: swap;\n  src: url(\"2c8e1cdb-a0ed-4803-abcb-28e0f73c78ea\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"d3b90822-9550-4332-a7b1-78bf52abb3ca\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg: #fff6ec;\n    --bg-2: #ffe7cf;\n    --ink: #2a1e17;\n    --ink-soft: #7a6654;\n    --paper: #fffdf7;\n    --pink: #ff7fb4;\n    --peach: #ffb26b;\n    --sky: #7ec8ff;\n    --mint: #9ce6b6;\n    --butter: #ffe26b;\n    --lilac: #c9a8ff;\n    --coral: #ff6b6b;\n    --grid: #ffd9b5;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    font-family:'Nunito', system-ui, sans-serif;\n    font-weight:600;\n    color:var(--ink);\n    background:var(--bg);\n    background-image:\n      radial-gradient(circle at 15% 10%, rgba(255,127,180,.15), transparent 40%),\n      radial-gradient(circle at 85% 30%, rgba(126,200,255,.18), transparent 45%),\n      radial-gradient(circle at 50% 90%, rgba(156,230,182,.12), transparent 40%);\n    overflow-x:hidden;\n  }\n  a{color:inherit}\n  .mono{font-family:'JetBrains Mono', monospace}\n  .serif{font-family:'Fraunces', serif; font-weight:800; letter-spacing:-.02em}\n\n  /* floating sparkles */\n  .sparkle{position:fixed; pointer-events:none; font-size:18px; opacity:.5; animation: float 6s ease-in-out infinite;}\n  @keyframes float{\n    0%,100%{transform:translate(0,0) rotate(0)}\n    50%{transform:translate(10px,-20px) rotate(15deg)}\n  }\n\n  /* ====== TOP TICKER ====== */\n  .ticker{\n    background:var(--ink); color:var(--bg);\n    overflow:hidden; white-space:nowrap;\n    font-family:'JetBrains Mono', monospace;\n    font-size:12px; padding:10px 0;\n    border-bottom:3px solid var(--pink);\n  }\n  .ticker-track{display:inline-block; animation:scroll 45s linear infinite; padding-left:100%}\n  .ticker-track span{margin:0 24px}\n  .ticker-track .dot{color:var(--pink)}\n  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}\n\n  /* ====== HERO ====== */\n  .hero{\n    position:relative;\n    padding: 60px 48px 30px;\n    max-width:1200px; margin:0 auto;\n  }\n  .eyebrow{\n    display:inline-flex; align-items:center; gap:10px;\n    background:var(--paper); border:2.5px solid var(--ink);\n    padding:8px 16px; border-radius:999px;\n    font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:700;\n    box-shadow: 4px 4px 0 var(--pink);\n  }\n  .eyebrow .blink{width:10px;height:10px;background:var(--coral);border-radius:50%;animation:blink 1.4s infinite}\n  @keyframes blink{0%,100%{transform:scale(1)}50%{transform:scale(1.4);opacity:.4}}\n\n  h1.title{\n    font-family:'Fraunces', serif;\n    font-weight:900;\n    font-size: clamp(46px, 7vw, 96px);\n    line-height:.98;\n    letter-spacing:-.035em;\n    margin: 24px 0 20px;\n  }\n  h1.title .hl{\n    background:var(--butter);\n    padding:0 .18em;\n    box-decoration-break:clone;\n    -webkit-box-decoration-break:clone;\n    border-radius:8px;\n    border:2.5px solid var(--ink);\n    display:inline-block;\n    transform: rotate(-1deg);\n  }\n  h1.title .pink{color:var(--pink); -webkit-text-stroke: 2px var(--ink)}\n  h1.title .wiggle{display:inline-block; animation: wiggle 2.8s ease-in-out infinite;}\n  @keyframes wiggle{\n    0%,100%{transform:rotate(-6deg)}\n    50%{transform:rotate(10deg) scale(1.1)}\n  }\n\n  .sub{\n    font-size:20px; max-width:720px;\n    color:var(--ink); font-weight:600; line-height:1.55;\n    margin-top:14px;\n  }\n  .sub b{background:var(--mint); padding:1px 6px; border-radius:4px; border:1.5px solid var(--ink)}\n  .sub .peach{background:var(--peach)}\n  .sub .sky{background:var(--sky)}\n\n  .btn-row{margin-top:24px; display:flex; gap:12px; flex-wrap:wrap}\n  .btn{\n    background:var(--ink);color:var(--paper);\n    padding:12px 18px;border-radius:14px;\n    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;\n    box-shadow:4px 4px 0 var(--pink);\n    text-decoration:none; display:inline-block;\n    border:2.5px solid var(--ink);\n    transition: all .15s;\n  }\n  .btn:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--pink)}\n  .btn.ghost{background:var(--paper); color:var(--ink); box-shadow:4px 4px 0 var(--sky)}\n  .btn.ghost:hover{box-shadow:6px 6px 0 var(--sky)}\n\n  .meta-row{\n    display:flex; flex-wrap:wrap; gap:10px; margin-top:28px;\n    font-family:'JetBrains Mono', monospace; font-size:12px;\n  }\n  .chip{\n    background:var(--paper); border:2px solid var(--ink);\n    padding:8px 14px; border-radius:999px; font-weight:700;\n  }\n  .chip b{color:var(--pink)}\n\n  /* sticker - cute cloud */\n  .sticker{\n    position:absolute; right:48px; top:120px;\n    width:180px; height:180px;\n    background:var(--pink); color:var(--ink);\n    border-radius:50%;\n    display:flex; align-items:center; justify-content:center;\n    text-align:center; font-family:'Fraunces',serif;\n    font-size:15px; font-weight:900; line-height:1.3;\n    transform:rotate(-8deg);\n    box-shadow: 6px 6px 0 var(--ink);\n    border:3px solid var(--ink);\n    animation:bob 3s ease-in-out infinite;\n    user-select:none;\n    cursor:pointer;\n  }\n  @keyframes bob{\n    0%,100%{transform:rotate(-8deg) translateY(0)}\n    50%{transform:rotate(-4deg) translateY(-8px)}\n  }\n  .sticker .face{font-size:32px; display:block; margin-bottom:4px}\n\n  /* ====== PROBLEM/SOLUTION HERO CARD ====== */\n  .problem-card{\n    max-width:1200px; margin: 36px auto 0; padding: 0 48px;\n  }\n  .pcard{\n    background:var(--paper);\n    border:3px solid var(--ink);\n    border-radius:28px;\n    padding:32px;\n    box-shadow: 8px 8px 0 var(--lilac);\n    position:relative;\n  }\n  .pcard .label{\n    position:absolute; top:-16px; left:28px;\n    background:var(--lilac); color:var(--ink);\n    padding:6px 14px; border-radius:999px;\n    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;\n    border:2.5px solid var(--ink);\n  }\n  .ps-row{display:grid; grid-template-columns:1fr auto 1fr; gap:24px; align-items:center}\n  .ps-col h3{\n    font-family:'Fraunces',serif; font-weight:900; font-size:22px; margin:0 0 12px;\n    letter-spacing:-.01em;\n  }\n  .ps-col ul{margin:0; padding:0; list-style:none}\n  .ps-col li{\n    font-size:15px; line-height:1.6; padding:10px 0;\n    border-bottom:1.5px dashed var(--grid);\n    display:flex; gap:10px;\n  }\n  .ps-col li:last-child{border-bottom:0}\n  .ps-col li .ico{font-size:20px; flex-shrink:0}\n  .ps-arrow{\n    font-size:44px; color:var(--pink);\n    animation: slide 1.8s ease-in-out infinite;\n  }\n  @keyframes slide{\n    0%,100%{transform:translateX(0)}\n    50%{transform:translateX(8px)}\n  }\n\n  /* ====== STATS ====== */\n  .stats{\n    max-width:1200px; margin: 36px auto 0; padding: 0 48px;\n    display:grid; grid-template-columns: repeat(4, 1fr); gap:16px;\n  }\n  .stat{\n    background:var(--paper);\n    border:3px solid var(--ink);\n    border-radius:22px;\n    padding:22px 20px;\n    box-shadow: 5px 5px 0 var(--ink);\n    position:relative;\n    transition:transform .2s;\n    cursor:default;\n  }\n  .stat:nth-child(1){background:var(--butter)}\n  .stat:nth-child(2){background:var(--mint)}\n  .stat:nth-child(3){background:var(--sky)}\n  .stat:nth-child(4){background:var(--peach)}\n  .stat:hover{transform:translate(-3px,-3px) rotate(-1deg); box-shadow: 8px 8px 0 var(--ink);}\n  .stat .emoji{font-size:28px; position:absolute; top:16px; right:18px}\n  .stat .num{\n    font-family:'Fraunces', serif r(--grid) 1.5px, transparent 1.5px);\n    background-size: 22px 22px;\n    opacity:.6;\n    pointer-events:none;\n  }\n  .arch-grid{\n    display:grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 16px 40px;\n    position:relative; z-index:1;\n    align-items:start;\n  }\n  .arch-col h4{\n    margin:0 0 14px; font-family:'Fraunces',serif; font-weight:900;\n    font-size:18px; color:var(--ink);\n    display:flex; align-items:center; gap:8px;\n  }\n  .arch-col h4 .ring{\n    background:var(--butter); width:28px;height:28px;border-radius:50%;\n    border:2px solid var(--ink); display:flex;align-items:center;justify-content:center;\n    font-size:14px;\n  }\n  .node{\n    background:var(--paper);\n    border:2.5px solid var(--ink);\n    padding:12px 14px; border-radius:14px;\n    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:500;\n    margin-bottom:10px;\n    transition:transform .15s, background .15s;\n    cursor:pointer;\n    position:relative;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .node:hover{background:var(--butter); transform:translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink)}\n  .node b{display:block; font-size:14px; margin-bottom:3px; font-weight:800; font-family:'Nunito'}\n  .node.server{background:var(--pink)}\n  .node.server:hover{background:var(--coral)}\n  .node.warn{border-style:dashed; background:var(--bg-2)}\n  .flow-arrow{\n    font-family:'JetBrains Mono',monospace; color:var(--ink-soft); font-weight:700;\n    text-align:center; font-size:12px; margin: 6px 0;\n  }\n\n  /* ====== TOOLS ====== */\n  .tools-grid{\n    display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;\n  }\n  .tool{\n    background:var(--paper);\n    border:3px solid var(--ink);\n    border-radius:18px;\n    padding:18px;\n    box-shadow: 4px 4px 0 var(--ink);\n    cursor:pointer;\n    transition:all .2s;\n    position:relative;\n  }\n  .tool:nth-child(6n+1){box-shadow:4px 4px 0 var(--pink)}\n  .tool:nth-child(6n+2){box-shadow:4px 4px ing:18px 16px; position:relative;\n    box-shadow: 4px 4px 0 var(--ink);\n    min-height:260px; overflow:hidden;\n    transition: all .3s;\n  }\n  .bug.squashed{\n    background:var(--mint); transform:rotate(-2deg);\n  }\n  .bug.squashed .bug-face{opacity:.3; filter:grayscale(1) blur(1px); animation:none}\n  .bug.squashed::after{\n    content:'✓ FIXED!';\n    position:absolute; top:20px; right:-6px;\n    background:var(--ink); color:var(--butter);\n    font-family:'Fraunces',serif; font-weight:900;\n    padding:6px 14px; border-radius:6px; font-size:15px;\n    border:2.5px solid var(--ink);\n    transform:rotate(6deg);\n  }\n  .bug-face{\n    width:56px; height:56px; border-radius:50%;\n    background:var(--peach); border:2.5px solid var(--ink);\n    display:flex; align-items:center; justify-content:center;\n    font-size:28px; margin-bottom:12px;\n    animation:wobble 2s ease-in-out infinite;\n    cursor:pointer; user-select:none;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .bug:nth-child(2) .bug-face{background:var(--sky); animation-delay:.3s}\n  .bug:nth-child(3) .bug-face{background:var(--butter); animation-delay:.6s}\n  .bug:nth-child(4) .bug-face{background:var(--pink); animation-delay:.9s}\n  @keyframes wobble{\n    0%,100%{transform:rotate(0) scale(1)}\n    25%{transform:rotate(-8deg) scale(1.08)}\n    75%{transform:rotate(8deg) scale(1.08)}\n  }\n  .bug h4{margin:0 0 6px; font-family:'Fraunces',serif; font-weight:900; font-size:14px; line-height:1.3}\n  .bug .symptom{\n    font-size:12px; background:var(--bg-2); border:1.5px solid var(--ink);\n    border-radius:8px; padding:6px 8px; margin:8px 0 6px;\n    font-family:'Nunito'; font-weight:600; line-height:1.4;\n  }\n  .bug .symptom b{color:var(--coral)}\n  .bug .fix{font-size:11.5px; color:var(--ink); line-height:1.5; margin-top:6px; font-weight:600; font-family:'Nunito'}\n  .bug .fix code{\n    font-family:'JetBrains Mono',monospace; background:var(--butter);\n    padding:1px 5px; border-radius:4px; font-size:10.5px;\n    border:1px solid var(--ink);\n  }\n\n  /* ====== CLIENTS ====== */\n  .clients{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}\n  .client{\n    background:var(--paper); border:3px solid var(--ink);\n    border-radius:18px; padding:22px 16px; text-align:center;\n    box-shadow:4px 4px 0 var(--ink);\n    transition:transform .2s;\n  }\n  .client:hover{transform:translateY(-4px) rotate(1deg)}\n  .client .ico{\n    width:64px;height:64px;border-radius:18px;\n    border:2.5px solid var(--ink);\n    display:flex;align-items:center;justify-content:center;\n    margin:0 auto 14px; font-size:30px;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .client:nth-child(1) .ico{background:var(--mint)}\n  .client:nth-child(2) .ico{background:var(--butter)}\n  .client:nth-child(3) .ico{background:var(--peach)}\n  .client:nth-child(4) .ico{background:var(--bg-2)}\n  .client h4{margin:0 0 8px; font-size:17px; font-family:'Fraunces',serif; font-weight:900}\n  .client .status{\n    display:inline-block; padding:4px 12px; border-radius:999px;\n    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;\n    margin-bottom:10px; border:2px solid var(--ink);\n  }\n  .client .status.ok{background:var(--mint)}\n  .client .status.warn{background:var(--butter)}\n  .client .status.no{background:var(--bg-2); color:var(--ink-soft)}\n  .client .note{font-size:12px; color:var(--ink); line-height:1.5; font-family:'Nunito'; font-weight:600}\n\n  /* ====== TIMELINE ====== */\n  .tl{\n    background:var(--paper); border:3px solid var(--ink);\n    border-radius:24px; padding:28px;\n    box-shadow: 6px 6px 0 var(--lilac);\n  }\n  .tl-labels{\n    display:flex; justify-content:space-between;\n    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); font-weight:700;\n    margin-bottom:10px;\n  }\n  .tl-bar{\n    position:relative; height:10px; background:var(--bg-2);\n    border:2.5px solid var(--ink); border-radius:999px; margin: 16px -paper); padding:6px 12px;border-radius:999px;font-size:11.5px;border:1.5px solid rgba(255,253,247,.3); font-family:'JetBrains Mono',monospace; font-weight:600}\n\n  /* ====== OUTRO ====== */\n  .outro{max-width:1200px; margin:80px auto 60px; padding:0 48px}\n  .outro-box{\n    background:var(--peach);\n    border:3px solid var(--ink);\n    border-radius:28px; padding: 42px 36px;\n    position:relative; overflow:hidden;\n    box-shadow: 8px 8px 0 var(--ink);\n  }\n  .outro-box::before{\n    content:''; position:absolute; right:-30px; top:-40px;\n    width:180px;height:180px; background:var(--pink); border-radius:50%;\n    border:3px solid var(--ink);\n  }\n  .outro-box::after{\n    content:''; position:absolute; right:100px; bottom:-50px;\n    width:130px;height:130px; background:var(--butter); border-radius:50%;\n    border:3px solid var(--ink);\n  }\n  .outro-box h3{\n    font-family:'Fraunces',serif; font-weight:900; font-size:40px;\n    letter-spacing:-.02em; margin:0 0 16px; position:relative; z-index:2;\n    max-width:640px; line-height:1.05;\n  }\n  .value-grid{\n    display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\n    margin-top:20px; position:relative; z-index:2;\n  }\n  .val{\n    background:var(--paper); border:2.5px solid var(--ink);\n    border-radius:14px; padding:16px;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n  .val h5{margin:0 0 6px; font-family:'Fraunces',serif; font-weight:900; font-size:16px; display:flex; gap:6px; align-items:center}\n  .val p{margin:0; font-size:13px; line-height:1.55; color:var(--ink); font-weight:600}\n  .sig{\n    margin-top:24px; font-family:'JetBrains Mono',monospace;\n    font-size:12px; color:var(--ink); font-weight:700; position:relative; z-index:2;\n  }\n\n  /* ====== CONFETTI ====== */\n  .confetti{position:fixed; pointer-events:none; inset:0; z-index:99; overflow:hidden}\n  .confetti i{\n    position:absolute; width:12px; height:14px;\n    border:1.5px solid var(--ink);\n    animation: fall 2.5s cubic-bezier(.2,.6,.4,1) forwards;\n  }\n  @keyframes fall{\n    0%{transform:translateY(-20vh) rotate(0); opacity:1}\n    100%{transform:translateY(110vh) rotate(720deg); opacity:0}\n  }\n\n  @media (max-width:900px){\n    .stats, .tools-grid, .decisions, .bugs, .clients, .value-grid, .ps-row{grid-template-columns:1fr}\n    .ps-arrow{display:none}\n    .arch-grid{grid-template-columns:1fr}\n    .sticker{display:none}\n    h1.title{font-size:48px}\n    section, .hero, .outro, .stats, .problem-card{padding-left:20px; padding-right:20px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- Ticker -->\n<div class=\"ticker\">\n  <div class=\"ticker-track\">\n    <span class=\"dot\">🌸<\u002Fspan><span>SHIPPED 2026-04-18<\u002Fspan>\n    <span class=\"dot\">🌼<\u002Fspan><span>0 → 公网开源 · ONE DAY<\u002Fspan>\n    <span class=\"dot\">🌷<\u002Fspan><span>让任意 Claude 客户端能读/写你的 markdown 笔记<\u002Fspan>\n    <span class=\"dot\">🌻<\u002Fspan><span>不跑 embedding · 不依赖向量数据库 · 零维护<\u002Fspan>\n    <span class=\"dot\">🌺<\u002Fspan><span>~250 行单文件 · 鼓励 fork<\u002Fspan>\n    <span class=\"dot\">🌼<\u002Fspan><span>MCP spec 2025-03-26 · Streamable HTTP<\u002Fspan>\n    <span class=\"dot\">🌸<\u002Fspan><span>github.com/tokyboop/memory-palace-mcp<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div class=\"eyebrow\"><span class=\"blink\"><\u002Fspan> <span>LIVE · 2026-04-18 · 今日的小成就 🌟<\u002Fspan><\u002Fdiv>\n  <h1 class=\"title\">\n    给 AI 一个<br>\n    能 <span class=\"wiggle\">📓<\u002Fspan> <span class=\"hl\">记事<\u002Fspan> 的<br>\n    <span class=\"pink\">小房子<\u002Fspan> 🏡\n  <\u002Fh1>\n  <p class=\"sub\">\n    一个工作日，从<b class=\"peach\">零<\u002Fb>到<b class=\"sky\">公网开源<\u002Fb>：\n    <b>Memory Palace MCP<\u002Fb> —— 一个<b>最小 Remote MCP 服务器<\u002Fb>参考实现。让 Claude 桌面版 / CLI / 网页版都能直接<b>读写你自己的 markdown 笔记<\u002Fb>，像有了一块共享的小黑板 🖍️\n  <\u002Fp>\n  <div class=\"btn-row\">\n    <a class=\"btn\" href=\"https://github.com/tokyboop/memory-palace-mcp\" target=\"_blank\">⭐ github.com/tokyboop/memory-palace-mcp →<\u002Fa>\n    <a class=\"btn ghost\" href=\"#problem\">它解决了什么 ↓<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"meta-row\">\n    <div class=\"chip\">📅 <b>1<\u002Fb> 工作日<\u002Fdiv>\n    <div class=\"chip\">🔌 <b>3<\u002Fb> 客户端<\u002Fdiv>\n    <div class=\"chip\">🧰 <b>6<\u002Fb> MCP 工具<\u002Fdiv>\n    <div class=\"chip\">🐛 <b>4<\u002Fb> 坑 solo 修复<\u002Fdiv>\n    <div class=\"chip\">📂 <b>~250<\u002Fb> 行<\u002Fdiv>\n    <div class=\"chip\">🌍 <b>公开<\u002Fb> MIT<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sticker\" id=\"sticker\">\n    <div>\n      <span class=\"face\">🏡<\u002Fspan>\n      OPEN<br>SOURCED<br>IN ONE DAY!\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM / SOLUTION -->\n<div class=\"problem-card\" id=\"problem\">\n  <div class=\"pcard\">\n    <div class=\"label\">🩹 它到底解决了什么？<\u002Fdiv>\n    <div class=\"ps-row\">\n      <div class=\"ps-col\">\n        <h3>😣 之前的尴尬<\u002Fh3>\n        <ul>\n          <li><span class=\"ico\">🧠<\u002Fspan><span>Claude 每次对话都像<b>失忆<\u002Fb>——上次聊的笔记、日记、TODO 全都要重新贴一遍<\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">🔌<\u002Fspan><span>Remote MCP 的 \"hello world\" 散落在 spec 更新、SDK 变化、transport 迁移之间，<b>能跑的最小样例几乎找不到<\u002Fb><\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">🧱<\u002Fspan><span>想上个人知识库？教程往往要你先搞 <b>embedding + 向量数据库<\u002Fb>——对 &lt; 100 篇笔记而言严重过度工程<\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">🔀<\u002Fspan><span>桌面 / 网页 / CLI 三端各写各的，状态漂移、数据打架<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"ps-arrow\">🎀→<\u002Fdiv>\n      <div class=\"ps-col\">\n        <h3>🎉 这个库给的答案<\u002Fh3>\n        <ul>\n          <li><span class=\"ico\">🏡<\u002Fspan><span>所有笔记住在<b>一台你自己的小服务器<\u002Fb>，任意 Claude 客户端连上就能读写<\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">📦<\u002Fspan><span><b>单文件 ~250 行<\u002Fb>就能跑——HTTPS、systemd、DNS rebinding 白名单、TLS 续期全都覆盖<\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">🔍<\u002Fspan><span>搜索用 <b>ripgrep 关键词<\u002Fb>，直接扫源 markdown——零维护、低延迟、结果可验证<\u002Fspan><\u002Fli>\n          <li><span class=\"ico\">🤝<\u002Fspan><span>三端共用一个真相源，<b>写入只走远程<\u002Fb>避免漂移<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- STATS -->\n<div class=\"stats\">\n  <div class=\"stat\">\n    <div class=\"emoji\">📅<\u002Fdiv>\n    <div class=\"num\" data-count=\"1\">0<\u002Fdiv>\n    <div class=\"lbl\">工作日<\u002Fdiv>\n    <div class=\"sub-lbl\">架构 → 部署 → 开源<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"emoji\">🧰<\u002Fdiv>\n    <div class=\"num\" data-count=\"6\">0<\u002Fdiv>\n    <div class=\"lbl\">MCP 工具<\u002Fdiv>\n    <div class=\"sub-lbl\">搜 / 读 / 写 / 列全覆盖<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"emoji\">🔌<\u002Fdiv>\n    <div class=\"num\" data-count=\"3\">0<\u002Fdiv>\n    <div class=\"lbl\">客户端接入<\u002Fdiv>\n    <div class=\"sub-lbl\">Desktop · CLI · Web<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat\">\n    <div class=\"emoji\">🐛<\u002Fdiv>\n    <div class=\"num\" data-count=\"4\">0<\u002Fdiv>\n    <div class=\"lbl\">坑 solo 修复<\u002Fdiv>\n    <div class=\"sub-lbl\">零阻塞 · 全部沉淀成笔记<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- REPO CARD -->\n<section style=\"padding-top:56px\">\n  <div class=\"repo-card\">\n    <div class=\"repo-head\">\n      <div class=\"repo-icon\">📦<\u002Fdiv>\n      <div>\n        <div class=\"mono\" style=\"font-size:11px;color:#b5a78d\">PUBLIC · MIT · 2026-04-18<\u002Fdiv>\n        <div class=\"repo-name\">tokyboop / <b>memory-palace-mcp<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <a href=\"https://github.com/tokyboop/memory-palace-mcp\" target=\"_blank\" class=\"btn\" style=\"margin-left:auto;background:var(--butter);color:var(--ink);box-shadow:4px 4px 0 var(--pink)\">⭐ STAR ON GITHUB →<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"font-family:'Nunito';font-size:14px;line-height:1.7;color:#f0e6d3;margin:0;max-width:820px;font-weight:600\">\n      <span style=\"color:var(--butter);font-family:'JetBrains Mono',monospace\">// README<\u002Fspan><br>\n      Minimal Remote MCP server reference: <b style=\"color:var(--pink)\">Streamable HTTP + ripgrep<\u002Fb>, no embeddings, no DB.\n      给任何想把 Remote MCP Server 真正部署到生产环境的人一份<b style=\"color:var(--butter)\">能跑的最小参考<\u002Fb>——把散落的 spec 更新、SDK 变化、transport 迁移浓缩进一个单文件，<b style=\"color:var(--mint)\">鼓励 fork 和改造<\u002Fb>。\n    <\u002Fp>\n    <div class=\"repo-tags\">\n      <span class=\"repo-tag\">🐍 Python<\u002Fspan>\n      <span class=\"repo-tag\">FastMCP<\u002Fspan>\n      <span class=\"repo-tag\">Streamable HTTP<\u002Fspan>\n      <span class=\"repo-tag\">systemd + nginx + TLS<\u002Fspan>\n      <span class=\"repo-tag\">ripgrep<\u002Fspan>\n      <span class=\"repo-tag\">~250 LOC 单文件<\u002Fspan>\n      <span class=\"repo-tag\">MIT<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ARCHITECTURE -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">01<\u002Fspan>\n    <h2>架构一眼懂<\u002Fh2>\n    <span class=\"tag\">hover 节点看说明 👀<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    三端 → 一个 TLS 反代 → 一个单文件 FastMCP → 两个笔记文件夹。<b>不跑向量、不搞数据库<\u002Fb>，读写直接操作磁盘上的 markdown 源文件。\n  <\u002Fp>\n  <div class=\"arch\">\n    <div class=\"arch-grid\">\n      <div class=\"arch-col\">\n        <h4><span class=\"ring\">👋<\u002Fspan> 谁来敲门 · Clients<\u002Fh4>\n        <div class=\"node\" title=\"本地 + 远程双 entry, 本地 stdio 只读\">\n          <b>Claude Desktop<\u002Fb>streamable-http + stdio fallback\n        <\u002Fdiv>\n        <div class=\"node\" title=\"claude mcp add --scope user --transport http\">\n          <b>Claude Code CLI<\u002Fb>user-scope http\n        <\u002Fdiv>\n        <div class=\"node warn\" title=\"Anthropic 侧 OAuth bug, token 丢失\">\n          <b>Claude.ai Web<\u002Fb>⚠ 受官方 OAuth bug 临时影响\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-col\">\n        <h4><span class=\"ring\">🚪<\u002Fspan> 看门的 · Edge<\u002Fh4>\n        <div class=\"node\" title=\"HTTPS 强制 · Let's Encrypt 自动续期\">\n          <b>nginx + TLS<\u002Fb>Let's Encrypt 自动续期\n        <\u002Fdiv>\n        <div class=\"flow-arrow\">↓ proxy to 127.0.0.1:8000<\u002Fdiv>\n        <div class=\"node\" title=\"开机自启 · 崩溃自愈 · journalctl 看日志\">\n          <b>systemd<\u002Fb>开机自启 + 崩溃自愈\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-col\">\n        <h4><span class=\"ring\">🏡<\u002Fspan> 小房子里面 · Server<\u002Fh4>\n        <div class=\"node server\" title=\"MCP Streamable HTTP · spec 2025-03-26\">\n          <b>FastMCP · server.py<\u002Fb>~250 行单文件\n        <\u002Fdiv>\n        <div class=\"node\" title=\"长文笔记 · 可手动放入\">\n          <b>knowledge/*.md<\u002Fb>长文笔记 📚\n        <\u002Fdiv>\n        <div class=\"node\" title=\"按年/月自动分子目录\">\n          <b>journal/YYYY/MM/*.md<\u002Fb>日记 ✍️\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TOOLS -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">02<\u002Fspan>\n    <h2>6 件小工具<\u002Fh2>\n    <span class=\"tag\">Claude 一打开就能用 🧰<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    写 MCP Server 的人常常纠结 \"要不要做 semantic 搜索\"。这个库的答案是：<b>个人规模不需要<\u002Fb>。关键词 ripgrep 简单、快、结果可肉眼验证。工具做成 6 件小螺丝，覆盖日常<b>\"找—读—写—列\"<\u002Fb>四个动作。\n  <\u002Fp>\n  <div class=\"tools-grid\" id=\"toolsGrid\">\n    <div class=\"tool\">\n      <span class=\"emoji\">🔍<\u002Fspan>\n      <h4>搜知识库<\u002Fh4>\n      <div class=\"fn\">search_knowledge(query)<\u002Fdiv>\n      <p>关键词查 <code style=\"font-family:'JetBrains Mono',monospace\">knowledge/<\u002Fcode> 里的长文笔记。<\u002Fp>\n      <div class=\"hint\">→ ripgrep · 零维护 · 全文命中<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tool\">\n      <span class=\"emoji\">📔<\u002Fspan>\n      <h4>搜日记<\u002Fh4>\n      <div class=\"fn\">search_journal(query)<\u002Fdiv>\n      <p>关键词查 <code style=\"font-family:'JetBrains Mono',monospace\">journal/<\u002Fcode> 里按年月归档的日记。<\u002Fp>\n      <div class=\"hint\">→ \"上次聊那个 xx 在哪来着\"<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tool\">\n      <span class=\"emoji\">🧺<\u002Fspan>\n      <h4>一键全搜<\u002Fh4>\n      <div class=\"fn\">search_all(query)<\u002Fdiv>\n      <p>两个文件夹一起搜，返回合并结果。懒人必备。<\u002Fp>\n      <div class=\"hint\">→ 全库扫一遍<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tool\">\n      <span class=\"emoji\">📖<\u002Fspan>\n      <h4>打开那一篇<\u002Fh4>\n      <div class=\"fn\">read_file(path)<\u002Fdiv>\n      <p>按路径把整篇 markdown 拉出来——<b>内置路径穿越防护<\u002Fb>，防止被骗着读服务器其他文件。<\u002Fp>\n      <div class=\"hint\">→ 安全 fetch<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tool\">\n      <span class=\"emoji\">✍️<\u002Fspan>\n      <h4>帮我记一笔<\u002Fh4>\n      <div class=\"fn\">write_note(folder, title, content, tags?)<\u002Fdiv>\n      <p>新建笔记，<b>自动 slug 文件名 + frontmatter<\u002Fb>。写入<b>只走远程<\u002Fb>，三端永远看到同一份真相。<\u002Fp>\n      <div class=\"hint\">→ 单一写入口 · 永不漂移<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tool\">\n      <span class=\"emoji\">🕰️<\u002Fspan>\n      <h4>最近写了啥<\u002Fh4>\n      <div class=\"fn\">list_recent(folder, n)<\u002Fdiv>\n      <p>按修改时间倒序列出最近 n 篇。回到电脑前先问一句就知道昨天自己写到哪了。<\u002Fp>\n      <div class=\"hint\">→ 上下文回血<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DECISIONS -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">03<\u002Fspan>\n    <h2>四个关键取舍<\u002Fh2>\n    <span class=\"tag\">每一刀都有理由 🔪<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    最小化不是\"什么都不做\"，是<b>知道该砍什么<\u002Fb>。每一条都对应一个真实会咬人的坑。\n  <\u002Fp>\n  <div class=\"decisions\">\n    <div class=\"dec\">\n      <div class=\"idx\">1<\u002Fdiv>\n      <h3>🚄 Transport：赌 Streamable HTTP<\u002Fh3>\n      <div class=\"problem\"><b>问题 ·<\u002Fb> SSE 即将弃用（2026-04-01 起不再受理）。现在用 SSE = 上线即过时。<\u002Fdiv>\n      <p class=\"sol\"><b>解法 ·<\u002Fb> 直接采用 MCP spec 2025-03-26 的 Streamable HTTP，一次到位，未来半年都不用改 transport。<\u002Fp>\n      <div class=\"vs\"><b class=\"win\">Streamable HTTP ✓<\u002Fb> &nbsp;vs&nbsp; <b class=\"lose\">SSE<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dec\">\n      <div class=\"idx\">2<\u002Fdiv>\n      <h3>🚦 stdio fallback 只读<\u002Fh3>\n      <div class=\"problem\"><b>问题 ·<\u002Fb> 桌面端同时配了 remote + local stdio 时，两边都能写，很容易出现<b>本地有 vs 远程有<\u002Fb>的分裂笔记。<\u002Fdiv>\n      <p class=\"sol\"><b>解法 ·<\u002Fb> 本地 stdio <b>只暴露读工具<\u002Fb>，写操作只走远程。三端永远指向同一个真相源。<\u002Fp>\n      <div class=\"vs\"><b class=\"win\">单写入口 ✓<\u002Fb> &nbsp;vs&nbsp; <b class=\"lose\">双向漂移<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dec\">\n      <div class=\"idx\">3<\u002Fdiv>\n      <h3>🧹 ripgrep &gt; embedding<\u002Fh3>\n      <div class=\"problem\"><b>问题 ·<\u002Fb> 个人规模（&lt; 100 篇）上 embedding + chunk 的维护成本（重索引、向量库、chunk 粒度调参）远高于收益。<\u002Fdiv>\n      <p class=\"sol\"><b>解法 ·<\u002Fb> 关键词 ripgrep 直接扫源文件——零维护、毫秒级、命中可肉眼验证。规模大了再换也不迟。<\u002Fp>\n      <div class=\"vs\"><b class=\"win\">ripgrep ✓<\u002Fb> &nbsp;vs&nbsp; <b class=\"lose\">embedding pipeline<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dec\">\n      <div class=\"idx\">4<\u002Fdiv>\n      <h3>🔐 auth 先推后<\u002Fh3>\n      <div class=\"problem\"><b>问题 ·<\u002Fb> v1 就做 Bearer / OAuth 会把 MVP 拖慢一周，可当下只有 1 个用户、URL 也没公开。<\u002Fdiv>\n      <p class=\"sol\"><b>解法 ·<\u002Fb> 靠\"域名未公开 + 允许的 origin 白名单\"兜底；Bearer / OAuth 进 backlog，触发条件（多人 / URL 外泄）一到就补。<\u002Fp>\n      <div class=\"vs\"><b class=\"win\">MVP 优先 ✓<\u002Fb> &nbsp;vs&nbsp; <b class=\"lose\">一步到位 auth<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BUGS -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">04<\u002Fspan>\n    <h2>四只小虫，点一下拍扁 🔨<\u002Fh2>\n    <span class=\"tag\">全部沉淀在 pitfalls.md<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    把踩过的坑全写进仓库里的 <code class=\"mono\" style=\"background:var(--butter);padding:1px 5px;border-radius:4px;border:1.5px solid var(--ink)\">knowledge/mcp-server-deployment-pitfalls.md<\u002Fcode>——让下一个想自建的人不用再撞一遍。\n  <\u002Fp>\n  <div class=\"bug-intro\">\n    <div class=\"score\">🐛 拍扁进度：<b id=\"squashCount\">0<\u002Fb> / 4<\u002Fdiv>\n    <button id=\"squashAll\">一键全拍 →<\u002Fbutton>\n    <span class=\"hint\">点虫子头或按按钮 · 每一只都是真实撞过、独立修复<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"bugs\" id=\"bugs\">\n    <div class=\"bug\">\n      <div class=\"bug-face\">🪲<\u002Fdiv>\n      <h4>FastMCP.run() 不再接 host / port<\u002Fh4>\n      <div class=\"symptom\"><b>症状 ·<\u002Fb> 启动不报错，但 nginx 连不上，host/port 看起来生效了其实没生效。<\u002Fdiv>\n      <div class=\"fix\"><b>修复 ·<\u002Fb> mcp ≥ 1.9 文档滞后；从 SDK 源码定位到参数已迁到 <code>FastMCP(...)<\u002Fcode> 构造器。<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bug\">\n      <div class=\"bug-face\">🐞<\u002Fdiv>\n      <h4>DNS rebinding 白名单<\u002Fh4>\n      <div class=\"symptom\"><b>症状 ·<\u002Fb> nginx 反代每次请求被 FastMCP 丢回 <code>421 Misdirected Request<\u002Fcode>。<\u002Fdiv>\n      <div class=\"fix\"><b>修复 ·<\u002Fb> mcp ≥ 1.13 默认拒绝，需手动传 <code>TransportSecuritySettings(allowed_hosts=..., allowed_origins=...)<\u002Fcode>。<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bug\">\n      <div class=\"bug-face\">🐛<\u002Fdiv>\n      <h4>which rg 谎报\"装好了\"<\u002Fh4>\n      <div class=\"symptom\"><b>症状 ·<\u002Fb> 本地一切正常，服务器上所有搜索 0 结果，报错也没有。<\u002Fdiv>\n      <div class=\"fix\"><b>修复 ·<\u002Fb> shell function 伪装成 binary 骗过 <code>which<\u002Fcode>；验证命令改用 <code>command -v rg &amp;&amp; rg --version<\u002Fcode>，纳入 handoff checklist。<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bug\">\n      <div class=\"bug-face\">👾<\u002Fdiv>\n      <h4>Windows stdout 默认 GBK<\u002Fh4>\n      <div class=\"symptom\"><b>症状 ·<\u002Fb> 中文笔记写日志直接 <code>UnicodeEncodeError<\u002Fcode>，服务器崩给你看。<\u002Fdiv>\n      <div class=\"fix\"><b>修复 ·<\u002Fb> 必须同时打两处：<code>subprocess<\u002Fcode> 的 <code>encoding=\"utf-8\"<\u002Fcode> + <code>sys.stdout.reconfigure<\u002Fcode>。<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLIENTS -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">05<\u002Fspan>\n    <h2>三端接入现状<\u002Fh2>\n    <span class=\"tag\">诚实 status board ✅⚠️<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    Desktop 和 CLI 全绿；Web 撞上了<b>官方侧的 OAuth bug<\u002Fb>（非本库问题，Anthropic 那边 token 没带到后续请求），目前退路走 Desktop。\n  <\u002Fp>\n  <div class=\"clients\">\n    <div class=\"client\">\n      <div class=\"ico\">🖥<\u002Fdiv>\n      <h4>Claude Desktop<\u002Fh4>\n      <div class=\"status ok\">✓ ONLINE<\u002Fdiv>\n      <div class=\"note\">remote streamable-http<br>+ 本地 stdio 双 entry<br>（本地只读兜底）<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"client\">\n      <div class=\"ico\">⌨️<\u002Fdiv>\n      <h4>Claude Code CLI<\u002Fh4>\n      <div class=\"status ok\">✓ ONLINE<\u002Fdiv>\n      <div class=\"note mono\">claude mcp add<br>--scope user<br>--transport http<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"client\">\n      <div class=\"ico\">🌐<\u002Fdiv>\n      <h4>Claude.ai Web<\u002Fh4>\n      <div class=\"status warn\">⚠ BLOCKED<\u002Fdiv>\n      <div class=\"note\">官方侧 OAuth bug<br>token 不带到后续请求<br>退路走 Desktop<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"client\">\n      <div class=\"ico\">📱<\u002Fdiv>\n      <h4>Mobile App<\u002Fh4>\n      <div class=\"status no\">✗ N/A<\u002Fdiv>\n      <div class=\"note\">App 目前无<br>custom connector 入口<br>退路走 Web<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TIMELINE -->\n<section>\n  <div class=\"section-h\">\n    <span class=\"n\">06<\u002Fspan>\n    <h2>一天的节奏表<\u002Fh2>\n    <span class=\"tag\">拖动小圆点 👆<\u002Fspan>\n  <\u002Fdiv>\n  <p class=\"section-lead\">\n    从架构拍板到仓库公开，六个节点记录下来，给想复刻的人当作节奏参考。\n  <\u002Fp>\n  <div class=\"tl\">\n    <div class=\"tl-labels\">\n      <span>AM · ☕<\u002Fspan><span>·<\u002Fspan><span>·<\u002Fspan><span>·<\u002Fspan><span>·<\u002Fspan><span>🚀 ship!<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tl-bar\">\n      <div class=\"fill\" id=\"tlFill\"><\u002Fdiv>\n      <div class=\"marker\" data-i=\"0\" style=\"left:0%\"><\u002Fdiv>\n      <div class=\"marker\" data-i=\"1\" style=\"left:20%\"><\u002Fdiv>\n      <div class=\"marker\" data-i=\"2\" style=\"left:40%\"><\u002Fdiv>\n      <div class=\"marker\" data-i=\"3\" style=\"left:60%\"><\u002Fdiv>\n      <div class=\"marker\" data-i=\"4\" style=\"left:80%\"><\u002Fdiv>\n      <div class=\"marker active\" data-i=\"5\" style=\"left:100%\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tl-desc\" id=\"tlDesc\">\n      <b>🚀 开源 Ship<\u002Fb>\n      公网可达 · systemd 稳跑 · 三端接入跑通 · README 中英双语 · pitfalls 笔记 · 仓库 MIT 公开。\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OUTRO -->\n<div class=\"outro\">\n  <div class=\"outro-box\">\n    <h3>所以，这一天到底产出了什么？<\u002Fh3>\n    <div class=\"value-grid\">\n      <div class=\"val\">\n        <h5>🧠 系统设计<\u002Fh5>\n        <p>在\"自用工具 vs 生产服务\"之间找中点——不过度工程化，但 HTTPS / systemd / 白名单 / 故障兜底 / 跨端策略一个都没漏。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"val\">\n        <h5>🛠 工程落地<\u002Fh5>\n        <p>一个工作日从架构拍板 → 公网上线 → 仓库公开。单文件 ~250 行跑通全链路，方便任何人 clone 就能起飞。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"val\">\n        <h5>🔧 问题定位<\u002Fh5>\n        <p>4 个坑（SDK 行为变化 / spec 细节 / shell 假象 / 编码陷阱）全部独立解决，未阻塞进度，并沉淀成可复用文档。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"val\">\n        <h5>🌱 生态贡献<\u002Fh5>\n        <p>把散落的 Remote MCP \"hello world\" 拼成一份<b>真的能跑的最小参考<\u002Fb>，鼓励 fork。帮下一个人少花一天摸索。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"https://github.com/tokyboop/memory-palace-mcp\" target=\"_blank\" class=\"btn\" style=\"margin-top:24px; background:var(--ink); color:var(--butter); box-shadow:4px 4px 0 var(--pink); position:relative; z-index:2\">⭐ STAR tokyboop/memory-palace-mcp →<\u002Fa>\n    <div class=\"sig\">— 2026-04-18 · made with 🫶 and ripgrep<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"confetti\" id=\"confetti\"><\u002Fdiv>\n\n<script>\n  // Counters\n  const counters = document.querySelectorAll('[data-count]');\n  const animate = (el) => {\n    const target = +el.dataset.count;\n    let cur = 0;\n    const step = Math.max(1, Math.ceil(target / 30));\n    const t = setInterval(()=>{\n      cur += step;\n      if(cur >= target){cur = target; clearInterval(t)}\n      el.textContent = cur;\n    }, 50);\n  };\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting){ animate(e.target); io.unobserve(e.target) } });\n  }, {threshold:.4});\n  counters.forEach(c=>io.observe(c));\n\n  // Bug squashing\n  const bugs = document.querySelectorAll('.bug');\n  const countEl = document.getElementById('squashCount');\n  let squashed = 0;\n  const squash = (b) => {\n    if(b.classList.contains('squashed')) return;\n    b.classList.add('squashed');\n    squashed++;\n    countEl.textContent = squashed;\n    burstConfetti(b);\n    if(squashed === 4) bigConfetti();\n  };\n  bugs.forEach(b=>{\n    b.querySelector('.bug-face').addEventListener('click', ()=>squash(b));\n  });\n  document.getElementById('squashAll').addEventListener('click', ()=>{\n    bugs.forEach((b,i)=>setTimeout(()=>squash(b), i*200));\n  });\n\n  // Confetti\n  const cc = document.getElementById('confetti');\n  const colors = ['#ff7fb4','#ffb26b','#7ec8ff','#9ce6b6','#ffe26b','#c9a8ff'];\n  const shapes = ['50%','0','20%'];\n  function burstConfetti(origin){\n    const rect = origin.getBoundingClientRect();\n    const x = rect.left + rect.width/2;\n    const y = rect.top + rect.height/2;\n    for(let i=0;i<24;i++){\n      const el = document.createElement('i');\n      el.style.background = colors[i%colors.length];\n      el.style.borderRadius = shapes[i%shapes.length];\n      el.style.left = x + 'px';\n      el.style.top = y + 'px';\n      el.style.animation = `fall ${1.2+Math.random()*1.2}s cubic-bezier(.2,.6,.4,1) forwards`;\n      cc.appendChild(el);\n      setTimeout(()=>el.remove(), 2500);\n    }\n  }\n  function bigConfetti(){\n    for(let i=0;i<140;i++){\n      const el = document.createElement('i');\n      el.style.background = colors[i%colors.length];\n      el.style.borderRadius = shapes[i%shapes.length];\n      el.style.left = Math.random()*100 + 'vw';\n      el.style.top = '-20px';\n      el.style.animationDelay = (Math.random()*.6)+'s';\n      cc.appendChild(el);\n      setTimeout(()=>el.remove(), 3500);\n    }\n  }\n\n  // Timeline\n  const tlStates = [\n    {t:'☕ 架构拍板', d:'Streamable HTTP vs SSE · auth 策略 · stdio fallback 只读 · 搜索路线（ripgrep vs embedding）全部定下，画一张草图贴到墙上。'},\n    {t:'🛠 部署搭架', d:'写 systemd unit · nginx 反代 · Let\\'s Encrypt 证书 · 127.0.0.1:8000 本地跑通，curl 一把确认 /mcp 端点有响应。'},\n    {t:'🔌 三端接入', d:'Desktop 配 streamable-http + stdio 双 entry · Claude Code CLI 一行命令加好 · Web 撞上官方 OAuth bug，记一条 backlog。'},\n    {t:'🐛 踩坑排查', d:'FastMCP 构造器位置变了 / allowed_hosts 白名单 / rg 没装被 shell 骗了 / Windows 编码炸码——四个独立修完，每个写进 pitfalls.md。'},\n    {t:'📝 Handoff + README', d:'中英双语 README · 部署脚本 · checklist · pitfalls 笔记全归档，让任何人 clone 就能起飞。'},\n    {t:'🚀 开源 Ship', d:'公网可达 · systemd 稳跑 · 三端接入跑通 · README 中英双语 · pitfalls 笔记 · 仓库 MIT 公开。'}\n  ];\n  const fill = document.getElementById('tlFill');\n  const desc = document.getElementById('tlDesc');\n  document.querySelectorAll('.marker').forEach(m=>{\n    m.addEventListener('click', ()=>{\n      document.querySelectorAll('.marker').forEach(x=>x.classList.remove('active'));\n      m.classList.add('active');\n      const i = +m.dataset.i;\n      fill.style.width = ((i/5)*100) + '%';\n      const s = tlStates[i];\n      desc.innerHTML = `<b>${s.t}<\u002Fb>${s.d}`;\n    });\n  });\n\n  // Sticker click → confetti\n  document.getElementById('sticker').addEventListener('click', bigConfetti);\n\n  // Small welcome burst\n  setTimeout(()=>{\n    for(let i=0;i<50;i++){\n      const el = document.createElement('i');\n      el.style.background = colors[i%colors.length];\n      el.style.borderRadius = shapes[i%shapes.length];\n      el.style.left = Math.random()*100 + 'vw';\n      el.style.top = '-20px';\n      el.style.animationDelay = (Math.random()*.8)+'s';\n      cc.appendChild(el);\n      setTimeout(()=>el.remove(), 3500);\n    }\n  }, 600);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
